services:
  mysql:
    image: mysql:8.4
    container_name: hailey-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: hailey-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "8090:8090"

  frontend:
    build:
      context: ./frontend
    container_name: hailey-frontend
    depends_on:
      - backend
    environment:
      PORT: ${FRONTEND_PORT}
      API_BASE_URL: ${API_BASE_URL}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"

volumes:
  mysql-data:
