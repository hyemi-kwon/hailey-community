services:
  mysql:
    ports:
      - "3307:3306" # 로컬에서 DB 직접 확인용

  backend:
    image: hailey-community-backend:local
    build:
      context: ./backend
    ports:
      - "8090:8090" # 로컬 백엔드 API 직접 확인용

  frontend:
    image: hailey-community-frontend:local
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-8080}:${FRONTEND_PORT:-8080}" # 로컬 프론트엔드 확인용
