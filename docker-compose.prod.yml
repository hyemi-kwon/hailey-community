services:
  nginx:
    image: nginx:alpine
    container_name: hailey-nginx
    ports:
      - "80:80"
    volumes:
      - /home/ubuntu/hailey-community/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ubuntu/hailey-community/nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
