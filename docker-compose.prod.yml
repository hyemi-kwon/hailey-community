services:
  nginx:
    image: nginx:alpine
    container_name: hailey-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/ubuntu/hailey-community/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ubuntu/hailey-community/nginx/certbot/www:/var/www/certbot:ro
      - /home/ubuntu/hailey-community/nginx/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
