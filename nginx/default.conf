server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    server_name hailey.my www.hailey.my api.hailey.my portainer.hailey.my;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.hailey.my;
    ssl_certificate /etc/letsencrypt/live/hailey.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hailey.my/privkey.pem;
    return 301 https://hailey.my$request_uri;
}

server {
    listen 443 ssl;
    server_name hailey.my;
    ssl_certificate /etc/letsencrypt/live/hailey.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hailey.my/privkey.pem;

    # Backward-compatible API route while clients migrate to api.hailey.my.
    location /v1/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://backend:8090;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://frontend:8080;
    }
}

server {
    listen 443 ssl;
    server_name api.hailey.my;
    ssl_certificate /etc/letsencrypt/live/hailey.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hailey.my/privkey.pem;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://backend:8090;
    }
}

server {
    listen 443 ssl;
    server_name portainer.hailey.my;
    ssl_certificate /etc/letsencrypt/live/hailey.my/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hailey.my/privkey.pem;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://portainer:9000;
    }
}
