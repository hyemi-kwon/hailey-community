# Add this overlay only after api.hailey.my DNS resolves to the EC2 instance and
# the certificate at /etc/letsencrypt/live/hailey.my includes api.hailey.my.
services:
  nginx:
    ports:
      - "443:443"
    volumes:
      - /home/ubuntu/hailey-community/nginx/default-https.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ubuntu/hailey-community/nginx/certbot/conf:/etc/letsencrypt:ro
