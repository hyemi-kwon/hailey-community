name: Test, build and deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore: ['**.md', '.gitignore', 'docs/**']
  pull_request:
    branches: [dev]

permissions:
  contents: read

concurrency:
  group: production-ec2
  cancel-in-progress: false

env:
  IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/hailey-community

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Test backend
        working-directory: backend
        run: ./gradlew test --no-daemon

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check frontend
        working-directory: frontend
        run: |
          npm ci
          npm run check

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}:backend-${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}:frontend-${{ github.sha }}

      - name: Copy deployment configuration to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.yml,docker-compose.prod.yml,docker-compose.https.yml,nginx/default.conf,nginx/default-https.conf.example
          target: /home/ubuntu/hailey-community
          overwrite: true

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -eu
            cd /home/ubuntu/hailey-community
            compose='docker-compose -f docker-compose.yml -f docker-compose.prod.yml'

            failed() {
              echo 'Deployment failed; current service state:'
              sudo env IMAGE_TAG="$IMAGE_TAG" sh -c "$compose ps" || true
              sudo docker logs --tail 100 hailey-backend || true
              sudo docker logs --tail 100 hailey-frontend || true
            }
            trap failed EXIT

            sudo env IMAGE_TAG="$IMAGE_TAG" sh -c "$compose config --quiet"
            sudo env IMAGE_TAG="$IMAGE_TAG" sh -c "$compose pull backend frontend"
            sudo env IMAGE_TAG="$IMAGE_TAG" sh -c "$compose up -d --remove-orphans"

            attempts=0
            until [ "$(sudo docker inspect --format '{{.State.Health.Status}}' hailey-backend)" = healthy ]; do
              attempts=$((attempts + 1))
              [ "$attempts" -lt 30 ] || exit 1
              sleep 5
            done
            [ "$(sudo docker inspect --format '{{.State.Running}}' hailey-frontend)" = true ]
            [ "$(sudo docker inspect --format '{{.State.Running}}' hailey-nginx)" = true ]

            sudo env IMAGE_TAG="$IMAGE_TAG" sh -c "$compose ps"
            sudo docker image prune -f
            trap - EXIT
